<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OPS+ Calculator</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; }
        input, select, button { padding: 10px; margin-top: 10px; width: 100%; font-size: 16px; }
        #result { margin-top: 20px; font-size: 24px; font-weight: bold; }
        a { display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="index.html">← Back to Home</a>
<h2>D1 Baseball OPS+ Calculator</h2>

<label>OBP:</label>
<input type="number" id="obp" step="0.001" placeholder="Enter OBP (e.g. 0.412)">

<label>SLG:</label>
<input type="number" id="slg" step="0.001" placeholder="Enter SLG (e.g. 0.650)">

<label>Select School:</label>
<select id="school"></select>

<button onclick="calculateOPSPlus()">Calculate OPS+</button>

<div id="result"></div>

<script>
// === PARK FACTORS JSON (same as ERA page) ===
const parkFactors = {
    "Air Force":145,
    "Morehead":142,
    "Nevada":135,
    "Appalachian St.":135
    // ...continue with all schools from your dataset...
};

// Populate dropdown alphabetically
const dropdown = document.getElementById("school");
dropdown.innerHTML = "<option value=''>-- Select School --</option>";

Object.keys(parkFactors).sort().forEach(school => {
    const opt = document.createElement("option");
    opt.value = parkFactors[school];
    opt.textContent = school;
    dropdown.appendChild(opt);
});

// OPS+ calculation
function calculateOPSPlus() {
    const obp = parseFloat(document.getElementById("obp").value);
    const slg = parseFloat(document.getElementById("slg").value);
    const pf = parseFloat(document.getElementById("school").value);

    const leagueOBP = 0.350;
    const leagueSLG = 0.446;
    const leagueOPS = leagueOBP + leagueSLG; // 0.796

    if (!obp || !slg || !pf) {
        document.getElementById("result").innerHTML = "Enter OBP, SLG, and select a school.";
        return;
    }

    const playerOPS = obp + slg;
    const adjustedOPS = playerOPS / (pf / 100);
    const opsPlus = 100 * (adjustedOPS / leagueOPS);

    document.getElementById("result").innerHTML = "OPS+: " + opsPlus.toFixed(1);
}
</script>

</body>
</html>
