// === POPULATE DROPDOWN ALPHABETICALLY ===
const dropdown = document.getElementById("school");
dropdown.innerHTML = "<option value=''>-- Select School --</option>";

Object.keys(parkFactors).sort().forEach(school => {
    const opt = document.createElement("option");
    opt.value = parkFactors[school];
    opt.textContent = school;
    dropdown.appendChild(opt);
});

// === ERA+ CALCULATION ===
function calculateERAPlus() {
    const era = parseFloat(document.getElementById("era").value);
    const pf = parseFloat(document.getElementById("school").value);
    const leagueERA = 5.42;

    if (!era || !pf) {
        document.getElementById("result").innerHTML = "Please enter an ERA and select a school.";
        return;
    }

    const eraPlus = 100 * ((leagueERA * (pf / 100)) / era);
    document.getElementById("result").innerHTML = "ERA+: " + eraPlus.toFixed(1);
}
</script>
