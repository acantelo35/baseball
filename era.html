<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ERA+ Calculator</title>
    <style>
        body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; }
        input, select, button { padding: 10px; margin-top: 10px; width: 100%; font-size: 16px; }
        #result { margin-top: 20px; font-size: 24px; font-weight: bold; }
        a { display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="index.html">← Back to Home</a>
<h2>D1 Baseball ERA+ Calculator</h2>

<label>Your ERA:</label>
<input type="number" id="era" step="0.01" placeholder="Enter ERA">

<label>Select School:</label>
<select id="school"></select>

<button onclick="calculateERAPlus()">Calculate ERA+</button>

<div id="result"></div>

<script>
// === PARK FACTORS (paste your full JSON object here) ===
const parkFactors = {
    /* use the same parkFactors JSON you already have */
};

// Populate dropdown alphabetically
const dropdown = document.getElementById("school");
dropdown.innerHTML = "<option value=''>-- Select School --</option>";

Object.keys(parkFactors).sort().forEach(school => {
    const opt = document.createElement("option");
    opt.value = parkFactors[school];
    opt.textContent = school;
    dropdown.appendChild(opt);
});

// ERA+ calculation
function calculateERAPlus() {
    const era = parseFloat(document.getElementById("era").value);
    const pf = parseFloat(document.getElementById("school").value);
    const leagueERA = 5.42;

    if (!era || !pf) {
        document.getElementById("result").innerHTML = "Enter ERA and select a school.";
        return;
    }

    const eraPlus = 100 * ((leagueERA * (pf / 100)) / era);
    document.getElementById("result").innerHTML = "ERA+: " + eraPlus.toFixed(1);
}
</script>

</body>
</html>
